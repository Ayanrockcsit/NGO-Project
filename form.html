<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry From</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0px;
            padding: 0px;
        }

        .From-outer {
            height: 600px;
            width: 460px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 50px 0px 50px 0px;
            background-color: darkcyan;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.7);
        }

        label {
            font-size: 18px;
            margin-left: 5px;
            color: #fff;
            font-family: 'poppins', sans-serif;

        }

        .input-box {
            height: 50px;
            width: 400px;
            border: none;
            border-bottom: 2px solid #fff;
            outline: none;
            padding: 10px;
            margin: 10px 0px 8px 0px;
            font-size: 15px;
            font-weight: 400;
            border-radius: 0px 15px 0px 15px;
            background-color: rgb(2, 70, 70);
            font-family: 'poppins', sans-serif;

        }

        textarea {
            height: 100px;
            width: 400px;
            resize: none;
            padding: 10px 0px 0px 10px;
            margin-top: 10px;
            font-size: 17px;
            border-radius: 0px 15px 0px 15px;
            border: none;
            border-bottom: 2px solid #f5ecec;
            outline: none;
            background-color: rgb(2, 70, 70);
            font-family: 'poppins', sans-serif;
        }

        .enquire-submit-button {
            padding: 10px 35px 10px 35px;
            margin: 10px 0px 0px 140px;
            border-radius: 10px 0px 10px 0px;
            background-color: rgb(2, 70, 70);
            border: 2px solid #fff;

        }

        .enquire-submit-button a {
            text-decoration: none;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
        }

        ::-webkit-input-placeholder {
            color: #c2c1c1;
        }

        @media(max-width:600px) {
            .form-outer {
                width: 95%;
                padding: 25px 15px;
            }

            .form-outer lebel {
                font-size: 17px;
            }

            .form-outer input,
            textarea {
                padding: 12px;
                border-radius: 15px;
            }

            .form-outer textarea {
                height: 120px;
            }

            .form-outer button {
                padding: 10px 35px;
            }
        }
    </style>
</head>

<body>
    <form action="" method="post" class="From-outer">
        <label for="name">Name:</label>
        <input type="Name" name="name" id="name" placeholder="Name" required class="input-box">
        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="Email" required class="input-box">
        <label for="number">Mobile No.:</label>
        <input type="number" name="number" id="number" placeholder="Number" required class="input-box">
        <label for="topic">Topic:</label>
        <input type="text" name="text" id="text" placeholder="Topic" class="input-box">
        <label for="textarea">Discription:</label>
        <textarea name="message" id="meassage" placeholder="Message"></textarea>
        <button class="enquire-submit-button"><a href="">SUBMIT</a></button>
    </form>
</body>

</html>
